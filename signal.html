<!DOCTYPE html>
<html>
<head>
<title>SIGNAL FOUND</title>

<style>
body {
  background: black;
  color: #e60000;
  font-family: monospace;
  text-align: center;
  overflow: hidden;
}

/* flicker effect */
@keyframes flicker {
  0% { opacity: 1; }
  50% { opacity: 0.6; }
  100% { opacity: 1; }
}

h1 {
  margin-top: 100px;
  animation: flicker 0.2s infinite;
  letter-spacing: 3px;
}

/* creepy text */
#whisper {
  margin-top: 20px;
  font-size: 14px;
  color: gray;
}

/* glitch overlay */
.glitch {
  position: absolute;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    0deg,
    rgba(255,0,0,0.05),
    rgba(255,0,0,0.05) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events: none;
}
</style>

</head>

<body>

<div class="glitch"></div>

<h1>UNIDENTIFIED SIGNAL</h1>

<p>you don’t have a choice</p>

<button onclick="goYes()">YES</button>

<p id="whisper"></p>

<script>
// redirect
function goYes() {
  window.location.href = "status.html";
}

// delayed creepy message
setTimeout(() => {
  document.getElementById("whisper").innerText = "...it already chose for you";
}, 3000);

// random flicker glitch
setInterval(() => {
  document.body.style.opacity = Math.random() * 0.5 + 0.5;
}, 120);
</script>

</body>
</html>
